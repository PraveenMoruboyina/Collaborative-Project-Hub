services:
  frontend:
    build: ../../frontend
    ports:
      - 80:80
  backend:
    build: ../../backend
    ports:
      - 4000:4000
    env_file:
      - ../../backend/.env
    depends_on:
      - postgres
  postgres:
    image: postgres:16
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
