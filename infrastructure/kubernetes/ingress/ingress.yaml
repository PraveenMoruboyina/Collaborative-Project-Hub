apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cph-ingress
  namespace: cph-app
spec:
  rules:
    - host: example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
